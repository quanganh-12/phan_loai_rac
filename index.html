<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phân loại rác</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<base href="/ten-repo/">

<link rel="stylesheet" href="style.css">

</head>

<body class="container text-center">

<h2 class="mt-3">🌱 Thực hành phân loại rác</h2>

<!-- ✅ Nút check (ẩn ban đầu) -->
<button id="checkBtn" class="btn btn-primary mt-3" style="display:none;">
    ✅ Kiểm tra
</button>

<hr>

<!-- ✅ DANH SÁCH ẢNH -->
<div id="images" class="d-flex flex-wrap justify-content-center mt-3">

    <!-- ✅ DANH SÁCH FULL 12 ẢNH -->

    <div class="item" draggable="true" data-name="fami.jpg">
        <img src="images/fami.jpg">
        <p>Vỏ hộp sữa</p>
    </div>

    <div class="item" draggable="true" data-name="pallet_go.jpg">
        <img src="images/pallet_go.jpg">
        <p>Pallet gỗ</p>
    </div>

    <div class="item" draggable="true" data-name="vo_hoa_qua.jpg">
        <img src="images/vo_hoa_qua.jpg">
        <p>Vỏ hoa quả</p>
    </div>

    <div class="item" draggable="true" data-name="ac_quy.jpg">
        <img src="images/ac_quy.jpg">
        <p>Bình ắc quy</p>
    </div>

    <div class="item" draggable="true" data-name="pallet_nhua.jpg">
        <img src="images/pallet_nhua.jpg">
        <p>Pallet nhựa</p>
    </div>

    <div class="item" draggable="true" data-name="thuc_an.jpg">
        <img src="images/thuc_an.jpg">
        <p>Thức ăn thừa</p>
    </div>

    <div class="item" draggable="true" data-name="son.jpg">
        <img src="images/son.jpg">
        <p>Vỏ thùng sơn</p>
    </div>

    <div class="item" draggable="true" data-name="chai_nhua.jpg">
        <img src="images/chai_nhua.jpg">
        <p>Vỏ chai nhựa</p>
    </div>

    <div class="item" draggable="true" data-name="rac_hoa_chat.jpg">
        <img src="images/rac_hoa_chat.jpg">
        <p>Giẻ lau hóa chất</p>
    </div>

    <div class="item" draggable="true" data-name="nilon.jpg">
        <img src="images/nilon.jpg">
        <p>Nilon</p>
    </div>

    <div class="item" draggable="true" data-name="hop_xop.jpg">
        <img src="images/hop_xop.jpg">
        <p>Hộp xốp</p>
    </div>

    <div class="item" draggable="true" data-name="pin.jpg">
        <img src="images/pin.jpg">
        <p>Pin thải</p>
    </div>

</div>
<div class="row mt-3 justify-content-center">
    <div class="col-3">
        <div class="box" data-type="recycle">♻️ Rác tái chế</div>
    </div>

    <div class="col-3">
        <div class="box" data-type="organic">🗑️ Rác sinh hoạt</div>
    </div>

    <div class="col-3">
        <div class="box" data-type="hazard">☠️ Rác nguy hại</div>
    </div>
</div>

<!-- ✅ POPUP KẾT QUẢ -->
<div class="modal fade" id="resultModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Kết quả</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <h3 id="resultText"></h3>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
      </div>

    </div>
  </div>
</div>

<!-- ✅ JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
